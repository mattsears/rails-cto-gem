---
# Project-local RuboCop config for the rails-cto gem itself.
# Mirrors the opinions from lib/rails_cto/templates/rubocop.yml so the gem's
# own code stays consistent with what it ships.

AllCops:
  TargetRubyVersion: 3.1
  NewCops: disable
  SuggestExtensions: false
  Exclude:
    - "bin/**/*"
    - "tmp/**/*"
    - "vendor/**/*"
    - "lib/rails_cto/templates/**/*"

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/FrozenStringLiteralComment:
  Enabled: true

Layout/LineLength:
  Max: 120

Metrics/MethodLength:
  Max: 25

Metrics/ClassLength:
  Max: 200

Metrics/AbcSize:
  Max: 25

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 11

# `error` is more descriptive than the default `e` short name.
Naming/RescuedExceptionsVariableName:
  PreferredName: error

# The hyphenated filenames are required: RuboCop loads extensions via
# `require: <gem-name>`, and this gem's name is "rails-cto".
Naming/FileName:
  Exclude:
    - "lib/rails-cto.rb"
    - "lib/rubocop/rails-cto.rb"
