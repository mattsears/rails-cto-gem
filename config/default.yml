---
RailsCTO/MinitestSubject:
  Description: >-
    Enforces the Minitest::Spec `subject` convention from the rails-cto plugin.
    Every test class must define `subject` exactly once at the top level, and
    must not reassign `subject` inside nested describe/it blocks.
  Enabled: true
  VersionAdded: "0.1"
  Include:
    - "**/test/**/*_test.rb"
